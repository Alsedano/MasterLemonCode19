<div class="galleryComponent">
  <app-selected-image
    [selectedImage]="selectedImage"
    [zoomInScaleImage]="scaleImage"
  ></app-selected-image>
  <app-image-list
    [imageList]="imageList"
    [selectedImageIndex]="selectedIndex"
    (newImageSelected)="imageFromListSelected($event)"
  ></app-image-list>
  <app-button-panel
    [totalImages]="imageList.length"
    [selectedImageIndex]="selectedIndex"
    (newImageIndexSelected)="updateImageSelectedByIndex($event)"
    (increaseImage)="increaseImagePanel()"
    (decreaseImage)="decreaseImagePanel()"
    (play)="playCarousel()"
    (stop)="stopCarousel()"
  ></app-button-panel>
</div>
